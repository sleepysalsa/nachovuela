<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NachoVuela">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#16203a"/>
      <stop offset="100%" stop-color="#080b16"/>
    </radialGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd479"/>
      <stop offset="55%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#e8791f"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- radar rings -->
  <g opacity="0.9">
    <circle cx="256" cy="256" r="168" fill="none" stroke="#26324f" stroke-width="2"/>
    <circle cx="256" cy="256" r="116" fill="none" stroke="#26324f" stroke-width="2"/>
    <circle cx="256" cy="256" r="64"  fill="none" stroke="#26324f" stroke-width="2"/>
  </g>
  <line x1="256" y1="80" x2="256" y2="432" stroke="#1f2942" stroke-width="2"/>
  <line x1="80" y1="256" x2="432" y2="256" stroke="#1f2942" stroke-width="2"/>

  <!-- radar sweep wedge -->
  <path d="M256 256 L256 88 A168 168 0 0 1 402 172 Z" fill="url(#sweep)" opacity="0.55"/>

  <!-- flight path arc -->
  <path d="M150 330 Q256 150 372 250" fill="none" stroke="url(#amber)" stroke-width="10" stroke-linecap="round" stroke-dasharray="4 22" opacity="0.85"/>

  <!-- paper plane / jet blip -->
  <g filter="url(#glow)" transform="translate(256 232) rotate(28)">
    <path d="M-52 20 L64 -24 L-8 46 L-16 14 Z" fill="url(#amber)"/>
    <path d="M-8 46 L-16 14 L14 2 Z" fill="#e8791f"/>
  </g>

  <!-- deal blip -->
  <circle cx="366" cy="176" r="12" fill="#34e0a1" filter="url(#glow)"/>
  <circle cx="366" cy="176" r="22" fill="none" stroke="#34e0a1" stroke-width="3" opacity="0.5"/>
</svg>

<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#080b16">
<title>NachoVuela — tu radar de vuelos</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="assets/logo-mark.svg">
<link rel="apple-touch-icon" href="assets/logo-mark.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NachoVuela">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="grain" aria-hidden="true"></div>

<header class="topbar">
  <div class="brand">
    <img src="assets/logo-mark.svg" alt="" class="brand__mark" width="40" height="40">
    <div class="brand__text">
      <span class="brand__name">Nacho<em>Vuela</em></span>
      <span class="brand__tag">radar de oportunidades</span>
    </div>
  </div>
  <div class="topbar__status" id="scanStatus">
    <span class="pulse"></span>
    <span id="scanStatusText">cargando…</span>
  </div>
</header>

<nav class="tabs" id="tabs">
  <button class="tab is-active" data-view="radar">Radar</button>
  <button class="tab" data-view="viajes">Viajes</button>
  <button class="tab" data-view="destinos">Destinos</button>
</nav>

<main id="app">
  <!-- RADAR -->
  <section class="view is-active" id="view-radar">
    <div class="hero">
      <div class="hero__radar" aria-hidden="true">
        <div class="radar-ring r1"></div>
        <div class="radar-ring r2"></div>
        <div class="radar-ring r3"></div>
        <div class="radar-sweep"></div>
        <div class="radar-cross v"></div>
        <div class="radar-cross h"></div>
      </div>
      <div class="hero__content" id="heroTop">
        <p class="hero__kicker">mejor oportunidad ahora</p>
        <div class="hero__skeleton">Rastreando el cielo…</div>
      </div>
    </div>

    <div class="statstrip" id="statStrip"></div>

    <div class="section-head">
      <h2>Radar de rutas</h2>
      <div class="filters" id="radarFilters">
        <button class="chip-filter is-active" data-flt="todos">Todas</button>
        <button class="chip-filter" data-flt="oportunidad">🟢 Oportunidades</button>
        <button class="chip-filter" data-flt="eeuu">EE.UU.</button>
        <button class="chip-filter" data-flt="europa">Europa</button>
      </div>
    </div>
    <div class="cards" id="radarCards"></div>
  </section>

  <!-- VIAJES -->
  <section class="view" id="view-viajes">
    <div class="section-head"><h2>Tus viajes</h2></div>
    <div id="viajesWrap"></div>
  </section>

  <!-- DESTINOS -->
  <section class="view" id="view-destinos">
    <div class="section-head"><h2>Explorar destinos</h2>
      <p class="section-sub">Precios promedio, temporada alta y clima — busques o no un viaje puntual.</p>
    </div>
    <div class="dest-grid" id="destGrid"></div>
  </section>
</main>

<div class="sheet" id="sheet" aria-hidden="true">
  <div class="sheet__backdrop" data-close></div>
  <div class="sheet__panel" role="dialog" aria-modal="true">
    <button class="sheet__close" data-close aria-label="Cerrar">✕</button>
    <div class="sheet__body" id="sheetBody"></div>
  </div>
</div>

<footer class="foot">
  <span>NachoVuela · hecho para cazar millas ✈️</span>
  <span id="footScan"></span>
</footer>

<script src="app.js"></script>
</body>
</html>
